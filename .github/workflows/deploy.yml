name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy P.T.R.S Landing Page
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Starting deployment..."
            sudo /home/ubuntu/lxc-manager/projects/ptrs-landing/deploy.sh
            echo "Deployment complete!"

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -s -o /dev/null -w "HTTP Status: %{http_code}" http://localhost:3006
